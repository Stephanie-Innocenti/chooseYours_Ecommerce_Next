<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Cosplay Vestiti Logo</title>
  <desc id="desc">Logo moderno e accattivante per sito di vestiti cosplay con hanger e stella.</desc>

  <defs>
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="gradSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F9A8D4" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7C3AED" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background accent -->
  <rect x="12" y="20" width="696" height="180" rx="28" fill="url(#gradSoft)"/>

  <!-- icon badge -->
  <g transform="translate(34,34)" filter="url(#shadow)">
    <rect x="0" y="0" width="152" height="152" rx="34" fill="#ffffff"/>
    <path d="M48 46c0-16 12-28 28-28 15 0 28 12 28 28 0 7-3 14-8 19l-10 9h22c8 0 14 6 14 14s-6 14-14 14H44c-8 0-14-6-14-14s6-14 14-14h22l-10-9c-5-5-8-12-8-19z" fill="url(#gradMain)"/>
    <path d="M44 104c14-10 27-15 40-15 13 0 26 5 40 15" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <path d="M114 28l8 8 12-3-3 12 8 8-12 3-3 12-8-8-12 3 3-12-8-8 12-3z" fill="#F59E0B" opacity="0.95"/>
  </g>

  <!-- text -->
  <g transform="translate(212,62)">
    <text x="0" y="48" font-family="Inter, Poppins, Montserrat, Arial, sans-serif" font-size="54" font-weight="800" fill="#111827" letter-spacing="0.5">Cosplay</text>
    <text x="0" y="104" font-family="Inter, Poppins, Montserrat, Arial, sans-serif" font-size="54" font-weight="800" fill="url(#gradMain)" letter-spacing="0.5">Vestiti</text>
    <text x="2" y="138" font-family="Inter, Poppins, Montserrat, Arial, sans-serif" font-size="18" font-weight="600" fill="#6B7280" letter-spacing="2">OUTFIT • STYLE • FANTASY</text>
  </g>
</svg>
